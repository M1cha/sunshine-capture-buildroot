image data.img {
	ext4 {}
	size = 8M
}

image sdcard.img {
	hdimage {
		partition-table-type = "gpt"
	}

	partition uboot {
		in-partition-table = "false"
		image = "u-boot-rockchip.bin"
		offset = 32K
	}

	partition rootfs {
		partition-type-uuid = L
		image = "rootfs.squashfs"
		bootable = true
		size = 512M
	}

	partition data {
		partition-type-uuid = L
		image = "data.img"
	}
}
